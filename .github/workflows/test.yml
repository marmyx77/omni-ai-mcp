name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Integration tests require a real API key — skip silently if not set
        continue-on-error: ${{ secrets.GEMINI_API_KEY == '' }}

      - name: Check imports
        run: |
          python -c "from app.core.config import config; print(f'v{config.version}: model_pro={config.model_pro}')"
          python -c "from app.services.model_registry import model_registry; print('ModelRegistry OK')"
          python -c "from app.services.openrouter import openrouter_client; print('OpenRouterClient OK')"
